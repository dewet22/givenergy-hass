# GivEnergy Local — Lovelace Dashboard
#
# Setup
# -----
# 1. In HA go to Settings → Dashboards → Add Dashboard, give it a name,
#    then open it and click the three-dot menu → Edit dashboard → Raw config editor.
# 2. Paste the contents of this file.
# 3. Search-replace the placeholders with your actual serial numbers
#    (use lowercase, exactly as shown in Settings → Devices):
#      INVERTER_SERIAL    →  e.g. sa1234g123
#      BATTERY_SERIAL_1   →  e.g. bt1234a001
#      BATTERY_SERIAL_2   →  e.g. bt1234a002   (duplicate/remove sections as needed)
#
# Required custom cards (install via HACS → Frontend):
#   - power-flow-card-plus  (flixlix/power-flow-card-plus)
#   - mini-graph-card  (kalkih/mini-graph-card)
#   - apexcharts-card  (RomRider/apexcharts-card)

title: GivEnergy
views:

  # ── Overview ──────────────────────────────────────────────────────────────
  - title: Overview
    path: overview
    icon: mdi:solar-power-variant

    cards:
      - type: custom:power-flow-card-plus
        entities:
          solar:
            entity: sensor.givenergy_inverter_INVERTER_SERIAL_pv_power
            display_zero_state: true
          battery:
            entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_power
            state_of_charge: sensor.givenergy_inverter_INVERTER_SERIAL_battery_soc
          grid:
            entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_export_power
          home:
            entity: sensor.givenergy_inverter_INVERTER_SERIAL_load_power

      - type: glance
        title: Status
        columns: 4
        entities:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_status
            name: Inverter
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_soc
            name: Battery SOC
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_pause_mode
            name: Pause Mode
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_temperature
            name: Battery Temp

      - type: glance
        title: Today
        columns: 6
        entities:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_pv_energy_today
            name: PV
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_charge_today
            name: Charged
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_discharge_today
            name: Discharged
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_import_today
            name: Imported
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_export_today
            name: Exported
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_load_energy_today
            name: Consumed

      - type: custom:apexcharts-card
        header:
          show: true
          title: Power — Last 24 Hours
        graph_span: 24h
        series:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_pv_power
            name: PV
            color: "#FFB300"
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_power
            name: Battery
            color: "#42A5F5"
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_export_power
            name: Grid
            color: "#66BB6A"
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_load_power
            name: Load
            color: "#EF5350"

  # ── Energy ────────────────────────────────────────────────────────────────
  - title: Energy
    path: energy
    icon: mdi:lightning-bolt

    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Daily Generation vs Consumption — Last 30 Days
        graph_span: 30d
        series:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_pv_energy_today
            name: PV Generated
            color: "#FFB300"
            type: column
            statistics:
              type: max
              period: day
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_load_energy_today
            name: Consumed
            color: "#EF5350"
            type: column
            statistics:
              type: max
              period: day

      - type: custom:apexcharts-card
        header:
          show: true
          title: Grid Import vs Export — Last 30 Days
        graph_span: 30d
        series:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_export_today
            name: Exported
            color: "#66BB6A"
            type: column
            statistics:
              type: max
              period: day
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_import_today
            name: Imported
            color: "#EF5350"
            type: column
            statistics:
              type: max
              period: day

      - type: custom:apexcharts-card
        header:
          show: true
          title: Battery Charge vs Discharge — Last 30 Days
        graph_span: 30d
        series:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_charge_today
            name: Charged
            color: "#42A5F5"
            type: column
            statistics:
              type: max
              period: day
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_discharge_today
            name: Discharged
            color: "#7E57C2"
            type: column
            statistics:
              type: max
              period: day

      - type: entities
        title: All-Time Totals
        entities:
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_pv_energy_total
            name: PV Generated
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_throughput_total
            name: Battery Throughput
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_export_total
            name: Grid Exported
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_grid_import_total
            name: Grid Imported
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_inverter_output_total
            name: Inverter Output
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_charge_from_grid_total
            name: Charged from Grid
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_discharge_this_year
            name: Discharged This Year

  # ── Battery ───────────────────────────────────────────────────────────────
  # sections view: one column per battery, cards stack vertically within each.
  # Add or remove sections below to match the number of batteries you have.
  - title: Battery
    path: battery
    type: sections
    icon: mdi:battery-high

    sections:

      # ── Battery 1 ── BATTERY_SERIAL_1 ──
