                name: Cell 12
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_cell_13_voltage
                name: Cell 13
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_cell_14_voltage
                name: Cell 14
