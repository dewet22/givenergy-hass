  # ── Controls ──────────────────────────────────────────────────────────────
  - title: Controls
    path: controls
    icon: mdi:tune

    cards:
      - type: entities
        title: Mode
        entities:
          - entity: select.givenergy_inverter_INVERTER_SERIAL_battery_power_mode
            name: Battery Power Mode
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_pause_mode
            name: Pause Mode
          - entity: sensor.givenergy_inverter_INVERTER_SERIAL_battery_calibration_stage
