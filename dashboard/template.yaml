            entity: sensor.givenergy_battery_BATTERY_SERIAL_1_soc
            name: BATTERY_SERIAL_1
            min: 0
            max: 100
            needle: true
            severity:
              red: 0
              yellow: 20
              green: 40

          - type: entities
            title: Pack Details
            entities:
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_soc
                name: SOC
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_voltage
                name: Voltage
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_temperature_max
                name: Temp Max
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_temperature_min
                name: Temp Min
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_bms_mosfet_temperature
                name: BMS MOSFET Temp
              - type: divider
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_charge_cycles
                name: Charge Cycles
              - entity: sensor.givenergy_battery_BATTERY_SERIAL_1_remaining_capacity
                name: Remaining Capacity
