# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

ci = { autofix_prs = false }

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-toml" },
  {
    id = "check-yaml",
    args = ["--unsafe"]
  },
  { id = "check-json" },
  {
    id = "pretty-format-json",
    args = [
      "--autofix",
      "--no-ensure-ascii",
      "--no-sort-keys"
    ]
  },
  { id = "check-ast" },
  { id = "debug-statements" },
  { id = "check-docstring-first" },
  { id = "check-added-large-files" },
  { id = "fix-byte-order-marker" },
  {
    id = "mixed-line-ending",
    args = ["--fix=lf"]
  },
  {
    id = "name-tests-test",
    args = ["--django"]
  }
]

[[repos]]
repo = "https://github.com/pre-commit/pygrep-hooks"
rev = "v1.10.0"
hooks = [
  { id = "python-check-mock-methods" },
  { id = "python-use-type-annotations" },
  { id = "python-check-blanket-noqa" },
  { id = "python-check-blanket-type-ignore" },
  { id = "python-no-eval" },
  { id = "python-no-log-warn" },
  { id = "rst-backticks" },
  { id = "rst-directive-colons" },
  { id = "rst-inline-touching-normal" },
  { id = "text-unicode-replacement-char" }
]

[[repos]]
repo = "https://github.com/asottile/pyupgrade"
rev = "v3.21.2"
hooks = [
  {
    id = "pyupgrade",
    args = ["--py313-plus"]
  }
]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"
hooks = [
  {
    id = "codespell",
    args = ["--ignore-words-list=hass,astroid"]
  }
]

[[repos]]
repo = "https://github.com/MarcoGorelli/absolufy-imports"
rev = "v0.3.1"
hooks = [
  # HA loads the integration as `givenergy_local`, not `custom_components.givenergy_local`,
  # so intra-package imports must stay relative. Tests live outside the package and
  # correctly use absolute imports, so the hook is still useful there.
  {
    id = "absolufy-imports",
    exclude = "^custom_components/"
  }
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
  {
    id = "ruff",
    args = ["--fix"]
  },
  { id = "ruff-format" }
]

[[repos]]
# Run mypy in the project's uv environment rather than mirrors-mypy's isolated
# venv. The isolated venv only had `pydantic` installed, so mypy couldn't see
# Home Assistant's (or givenergy-modbus's) types — with `ignore_missing_imports`
# every HA-API type error silently passed. `uv run mypy` uses the exact
# pinned deps from uv.lock, matching the validate.yml job. Needs uv on $PATH.
# pass_filenames = false so mypy uses `files` from pyproject (whole-package
# analysis), not the staged-file list. See astral-sh/uv-pre-commit#14.
repo = "local"
hooks = [
  {
    id = "mypy",
    name = "mypy",
    entry = "uv run mypy",
    language = "system",
    types = ["python"],
    pass_filenames = false
  }
]

[[repos]]
repo = "https://github.com/PyCQA/bandit"
rev = "1.9.4"
hooks = [
  {
    id = "bandit",
    args = [
      "--quiet",
      "--format=custom",
      "--configfile=.bandit.yaml",
      "--exclude=tests"
    ]
  }
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.12"
hooks = [
  { id = "uv-lock" }
]
