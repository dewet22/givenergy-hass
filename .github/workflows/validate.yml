name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

# These jobs only read the repo (checkout, validate, type-check, test) — scope
# the token down from the default so a compromised step can't write.
permissions:
  contents: read

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa  # main
        with:
          category: integration

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: home-assistant/actions/hassfest@d05c25388490cd662baef8495e1bc764c3386153  # master

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - run: uv sync
      # Same invocation as the prek local hook; checks `files` from pyproject.
      - run: uv run mypy custom_components

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest

  deprecations:
    name: deprecation watch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - run: uv sync
      # Non-blocking: surface (don't gate on) deprecation warnings so an upcoming
      # upstream API removal can't catch us out. Emits a GitHub warning annotation
      # if any fire, then exits 0 — the `tests` job owns gating, this is just an
      # alarm. Real test failures are absorbed here (they fail `tests`).
      - name: Surface deprecation warnings
        run: |
          uv run pytest -q -W always::DeprecationWarning 2>&1 | tee dep.log || true
          if grep -iE "DeprecationWarning|PendingDeprecationWarning" dep.log >/dev/null; then
            count=$(grep -icE "DeprecationWarning|PendingDeprecationWarning" dep.log)
            echo "::warning title=Deprecation warnings ($count)::Deprecated APIs are in use — migrate before upstream removes them (see log below)."
            grep -iE "DeprecationWarning|PendingDeprecationWarning" dep.log | sort -u
          else
            echo "No deprecation warnings — clean."
          fi

  js-tests:
    name: js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
