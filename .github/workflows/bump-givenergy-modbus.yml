name: Bump givenergy-modbus

# Run manually to bump the givenergy-modbus pin and open a PR. modbus releases
# are announced via the cross-agent coordination channel (the automated
# repository_dispatch from givenergy-modbus's release workflow was retired), so
# this is workflow_dispatch only.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump givenergy-modbus to (e.g. 1.2.0)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Determine target version and base branch
        id: ver
        env:
          NEW: ${{ inputs.version }}
        run: |
          if [ -z "$NEW" ]; then
            echo "::error::no version supplied via workflow inputs"
            exit 1
          fi
          # Validate before NEW flows into git refs, commit messages, PR bodies,
          # GITHUB_OUTPUT, and a Python regex backref template downstream. The
          # trust boundary here is the workflow_dispatch input (repo-write
          # access) — a malicious value shouldn't be able to inject shell
          # metacharacters, newlines (GITHUB_OUTPUT injection), `\g<...>` (regex
          # backref subversion in the bump step), or git ref operators (`..`,
          # `^`, `:` in the branch name). The pattern accepts every modbus tag in
          # history (`X.Y.Z`, `X.Y.ZrcN`, `X.Y.ZaN`) plus forward-looking
          # PEP 440 `.dev`/`.post` suffixes; the inner repetition deliberately
          # requires each dot-separated segment to be non-empty, so values
          # like `2.0.0..` or `2.0.0.post..1` — which would pass a coarser
          # `[a-z0-9.]+` class but then break `git checkout -B` downstream —
          # are rejected here instead.
          if ! [[ "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.]?[a-z0-9]+(\.[a-z0-9]+)*)?$ ]]; then
            echo "::error::invalid givenergy-modbus version format (must match PEP 440-ish X.Y.Z[-?suffix])"
            exit 1
          fi
          # Route the PR to the branch whose dependency range that minor
          # version belongs to. Convention: hass v1.0 tracks modbus v2.0,
          # hass main tracks every later 2.x minor. A 3.x major fails the
          # routing on purpose — that bump deserves a deliberate decision.
          major="${NEW%%.*}"
          minor="${NEW#*.}"; minor="${minor%%.*}"
          case "$major.$minor" in
            2.0) base=v1.0 ;;
            2.*) base=main ;;
            *)
              echo "::error::no target branch configured for givenergy-modbus ${major}.${minor}.x (version $NEW)"
              exit 1
              ;;
          esac
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ver.outputs.base }}
          # PAT (not GITHUB_TOKEN) so the resulting push + PR-creation events
          # fire downstream workflows — GITHUB_TOKEN-authored actions don't
          # trigger other workflows by design, which would otherwise leave the
          # bump PR without validate.yml checks running.
          token: ${{ secrets.BUMP_PAT }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Bump pin in pyproject.toml and manifest.json
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib, glob
          new = os.environ["NEW"]
          # Rewrite the givenergy-modbus requirement to an exact ==<new> pin,
          # whatever operator or bounds it currently carries. The integration
          # pins modbus exactly (we own both sides of the ecosystem, so each
          # bump is a deliberate sync); the whole quoted requirement is replaced
          # wholesale, matching the legacy ">=x,<y" range and the current "==x"
          # shape alike, including pre-release suffixes.
          pattern = re.compile(r'"givenergy-modbus[^"]*"')

          targets = ["pyproject.toml", *glob.glob("custom_components/*/manifest.json")]
          for path in targets:
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              text = p.read_text()
              updated, n = pattern.subn(f'"givenergy-modbus=={new}"', text)
              if n == 0:
                  print(f"warning: no givenergy-modbus pin found in {path}")
                  continue
              p.write_text(updated)
              print(f"bumped {n} pin(s) in {path}")
          PY

      - name: Refresh uv.lock
        run: uv lock --upgrade-package givenergy-modbus

      - name: Commit, push, open PR
        env:
          GH_TOKEN: ${{ secrets.BUMP_PAT }}
          NEW: ${{ steps.ver.outputs.new }}
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          if git diff --quiet; then
            echo "nothing to bump (pin already at ${NEW}?)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="bump/givenergy-modbus-${NEW}"
          git checkout -B "$branch"
          git add -A
          git commit -m "fix(deps): bump givenergy-modbus to ${NEW}"
          git push -f origin "$branch"

          existing=$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #${existing} already open for ${branch}; updated branch in place"
          else
            gh pr create \
              --title "fix(deps): bump givenergy-modbus to ${NEW}" \
              --body "Automated bump triggered by [givenergy-modbus@${NEW}](https://github.com/dewet22/givenergy-modbus/releases/tag/v${NEW})." \
              --base "$BASE" \
              --head "$branch"
          fi
