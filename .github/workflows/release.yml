name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0  # need full tag history for the changelog step
          persist-credentials: false

      - name: Generate release notes from git log
        id: notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Require an annotated tag — the message becomes the release blurb.
          # Keep interior blank lines: they are the markdown paragraph breaks
          # between the blurb's heading+paragraph blocks. Deleting them (the
          # old `sed '/^$/d'`) flattened multi-paragraph blurbs into one blob
          # in the HACS update dialog (v1.3.0). Command substitution already
          # trims trailing newlines, so the emptiness check below still holds.
          blurb="$(git tag -l --format='%(contents)' "$TAG" | sed '/^-----BEGIN PGP/,/^-----END PGP/d' | sed 's/[[:space:]]*$//')"
          if [ -z "$blurb" ]; then
            echo "::error::Tag '$TAG' has no message. Use 'git tag -a $TAG -m \"...\"' to add a release blurb."
            exit 1
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${TAG}"
            compare="**Full Changelog**: https://github.com/${REPO}/compare/${previous_tag}...${TAG}"
          else
            range="$TAG"
            compare=""
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$blurb"
            echo
            echo "## Changes"
            echo
            git log "$range" --no-merges --reverse --pretty=format:'- %s (%h)'
            echo
            echo
            [ -n "$compare" ] && echo "$compare"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

          # Mark as pre-release if the tag contains a pre-release identifier.
          if echo "$TAG" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.body }}
          PRERELEASE: ${{ steps.notes.outputs.prerelease }}
        run: |
          flags=""
          [ "$PRERELEASE" = "true" ] && flags="--prerelease"
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" $flags

      - name: Patch manifest.json with release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          jq --arg v "$version" '.version = $v' \
            custom_components/givenergy_local/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/givenergy_local/manifest.json

      - name: Build release zip
        run: |
          cd custom_components/givenergy_local
          zip -r ../../givenergy_local.zip .

      - name: Upload zip and update release notes
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: givenergy_local.zip
          body: ${{ steps.notes.outputs.body }}
