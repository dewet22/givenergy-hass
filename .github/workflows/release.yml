name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Patch manifest.json with release tag
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          jq --arg v "$version" '.version = $v' \
            custom_components/givenergy_local/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/givenergy_local/manifest.json

      - name: Build release zip
        run: |
          cd custom_components/givenergy_local
          zip -r ../../givenergy_local.zip .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: givenergy_local.zip
