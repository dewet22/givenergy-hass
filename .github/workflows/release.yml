name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest.json version matches the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(jq -r '.version' custom_components/givenergy_local/manifest.json)"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' implies version '${tag_version}', but manifest.json declares '${manifest_version}'. Bump manifest.json before tagging."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
