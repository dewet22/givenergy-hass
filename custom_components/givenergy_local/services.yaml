reboot_inverter:
  name: Reboot inverter
  description: >
    Restarts the GivEnergy inverter. The inverter will be offline for approximately
    30 seconds. Only use this if the inverter is in an unresponsive state.
  fields:
    device_id:
      name: Device
      description: The GivEnergy inverter to reboot.
      required: true
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number

calibrate_battery_soc:
  name: Calibrate battery state of charge
  description: >
    Instructs the inverter to recalibrate its battery state-of-charge estimation.
    This triggers a full charge/discharge cycle and should only be run when advised
    by GivEnergy support or as part of routine battery maintenance.
  fields:
    device_id:
      name: Device
      description: The GivEnergy inverter to calibrate.
      required: true
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number

set_system_datetime:
  name: Set inverter date & time
  description: >
    Sets the GivEnergy inverter's internal clock to Home Assistant's current
    local time. Useful if the inverter's clock has drifted — it affects
    charge/discharge slot scheduling.
  fields:
    device_id:
      name: Device
      description: The GivEnergy inverter whose clock to set.
      required: true
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number

capture_frames:
  name: Capture debug frames
  description: >
    Records raw Modbus wire frames from the inverter for a set duration and
    saves them as a redacted text file in /local/. A persistent notification
    with a download link appears when the capture finishes. Attach the file
    when reporting connectivity or communication issues.
  fields:
    device_id:
      name: Device
      description: >
        The GivEnergy inverter to capture from. If omitted, the first
        connected inverter is used.
      required: false
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number
    duration:
      name: Duration (seconds)
      description: How long to capture frames for. Defaults to 60 seconds.
      default: 60
      selector:
        number:
          min: 10
          max: 300
          step: 10
          unit_of_measurement: s
          mode: box

expose_recommended_entities:
  name: Expose recommended entities to voice assistants
  description: >
    One-shot service that exposes an opinionated headline set of entities
    (battery SOC, PV/grid/load power, today's and lifetime energy totals,
    inverter status) to one or more voice/LLM assistants. Idempotent — safe
    to re-run; never un-exposes entities, so any manual changes you make
    afterwards survive subsequent calls.
  fields:
    device_id:
      name: Device
      description: The GivEnergy inverter whose entities should be exposed.
      required: true
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number
    assistants:
      name: Assistants
      description: >
        Which assistant platforms to expose entities to. Defaults to
        `conversation`, which covers Assist, the LLM tools API, and
        MCP-via-conversation. Add `cloud.alexa` or `cloud.google_assistant`
        if you also want those platforms to see the entities.
      default:
        - conversation
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - conversation
            - cloud.alexa
            - cloud.google_assistant

redetect_plant:
  name: Re-detect plant topology
  description: >
    Clears the cached plant topology and reloads the integration, forcing a
    full hardware detection sweep on the next connect. Use this after adding
    or removing a battery, or any other change to the plant layout.
  fields:
    device_id:
      name: Device
      description: The GivEnergy inverter whose plant topology should be re-detected.
      required: true
      selector:
        device:
          integration: givenergy_local
          entity:
            domain: number

generate_dashboard:
  name: Generate dashboard
  description: >
    Generates a pre-configured dashboard YAML file for all connected
    inverters and makes it available for download via a persistent notification.
    Import it via Settings → Dashboards → Add Dashboard.
  fields:
    max_power_kw:
      name: Power chart envelope (kW)
      description: >
        Vertical limit (±kW) applied to the Overview view's 24-hour power chart.
        Readings outside this envelope are treated as garbage data and rendered
        off-chart, so a single bad sample can't blow up the y-axis. Defaults to
        10 kW, which suits typical single-phase systems. Raise for larger
        3-phase setups.
      default: 10
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: kW
          mode: box
